services:
  - type: web
    name: wematch
    runtime: node
    plan: starter
    region: oregon
       buildCommand: npm install
    startCommand: node scripts/migrate.js && node scripts/migrate-subscriptions.js && node scripts/migrate-photos.js && node backend/server.js
    healthCheckPath: /api/health
    autoDeploy: true
    disk:
      name: wematch-db
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /data/wematch.db
      - key: ALLOWED_ORIGINS
        value: https://wematch.dating,https://www.wematch.dating
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: APP_URL
        value: https://wematch.dating
